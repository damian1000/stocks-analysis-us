plugins {
    id 'java'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.springframework.boot' version '4.0.6'
    id 'jacoco'
}

version = '1.0-SNAPSHOT'

java {
    toolchain {
        // Uses JDK 25 (you've installed 25.0.1 via winget)
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Framework / Data
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // Jakarta EE (versions managed by Spring Boot BOM)
    implementation 'jakarta.annotation:jakarta.annotation-api'
    implementation 'jakarta.persistence:jakarta.persistence-api'

    // Microsoft Office / Excel handling
    implementation 'org.apache.poi:poi:5.5.0'

    // JXLS (Excel templating)
    implementation 'org.jxls:jxls:2.14.0'          // <-- contains org.jxls.util.JxlsHelper
    implementation 'org.jxls:jxls-poi:3.0.0'       // POI integration for JXLS

    // Content Detection and Extraction
    implementation 'org.apache.tika:tika-core:3.2.3'
    implementation 'org.apache.tika:tika-parsers-standard-package:3.2.3'

    // Date and Time
    implementation 'joda-time:joda-time:2.14.0'

    // JSON
    implementation 'com.google.code.gson:gson:2.13.2'

    // HTTP Client
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'

    // Apache Commons
    implementation 'org.apache.commons:commons-email:1.6.0'
    implementation 'org.apache.commons:commons-lang3:3.17.0'

    // Database Migration
    implementation 'org.flywaydb:flyway-core:11.17.0'

    // Database Driver
    implementation 'org.postgresql:postgresql:42.7.8'

    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.42'

    // Test dependencies
    testImplementation 'com.h2database:h2:2.4.240'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testCompileOnly 'org.projectlombok:lombok:1.18.42'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.42'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
    // Exclude scaffolding that isn't usefully unit-testable:
    //   Application       — Spring Boot main, exercised by Spring's @SpringBootTest only
    //   HtmlRetriever     — wraps real network I/O via Apache HttpClient
    //   *Repository       — Spring Data repository interfaces (no bodies) plus
    //                       the inner ZacksSpecs spec-builder classes
    afterEvaluate {
        classDirectories.setFrom(
            files(classDirectories.files.collect {
                fileTree(dir: it, exclude: [
                    '**/Application.class',
                    '**/HtmlRetriever.class',
                    '**/*Repository.class',
                    '**/*Repository$*.class',
                ])
            })
        )
    }
}

jar {
    manifest {
        attributes(
                'Main-Class': 'io.github.damian1000.stocks.Application',
        )
    }

    // fat jar (all dependencies bundled)
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}
