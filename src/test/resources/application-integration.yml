spring:
  config:
    activate:
      on-profile: integration
  application:
    name: stock-analysis-us
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        hbm2ddl:
          auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

stocks:
  analysis:
    us:
      stocklookup:
        sleeptime:
          min: 0
          max: 1
      template: template/ZacksPriceDetailsTemplate.xls
      email:
        enabled: false

logging:
  level:
    root: INFO
    org.hibernate.engine.jdbc.env.internal.LobCreatorBuilderImpl: ERROR
    org.hibernate.metamodel.internal: ERROR
    org.apache.commons.jexl2.JexlEngine: ERROR

server:
  port: 0
