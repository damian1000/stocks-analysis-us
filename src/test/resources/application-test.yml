spring:
  config:
    activate:
      on-profile: test
  application:
    name: stock-analysis-us
  datasource:
    url: jdbc:h2:mem:myDb
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          auto: create
    open-in-view: false
  flyway:
    enabled: false

stocks:
  analysis:
    us:
      stocklookup:
        sleeptime:
          min: 0
          max: 1
      template: template/ZacksPriceDetailsTemplate.xls
      email:
        enabled: false

logging:
  file:
    name: "test-stock-analysis-us.log"
  level:
    root: INFO
    org.hibernate.engine.jdbc.env.internal.LobCreatorBuilderImpl: ERROR
    org.apachehttp.wire: INFO
    org.hibernate.metamodel.internal: ERROR
    org.apache.commons.jexl2.JexlEngine: ERROR
    # com.zaxxer.hikari: debug

server:
  port: 9000
